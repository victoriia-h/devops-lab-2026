apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      containers:
      - name: ecommerce-app
        image: ecommerce-app:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:           
            name: ecommerce-secret
        - configMapRef:
            name: ecommerce-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
spec:
  type: ClusterIP
  selector:
    app: ecommerce-app
  ports:
  - port: 80
    targetPort: 8000
